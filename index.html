<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brew & Banter RoboCafe</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #3a2419;
      --accent: #c9a04c;
      --border: #e7ddd0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      display: block;
      background: #eee;
    }

    .content {
      padding: 30px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
      line-height: 1.1;
      text-align: center;
    }

    p {
      margin: 0 0 20px;
      font-size: .25rem;
      line-height: 1.6;
    }

    .signup-button {
      display: block;
      width: fit-content;
      margin: 0 auto;
      text-decoration: none;
      text-align: center;
      border: none;
      border-radius: 8px;
      padding: 8px 25px;
      font-size: 2rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    .signup-button:hover {
      opacity: 0.92;
    }

    .note {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #6b5a4f;
    }

    @media (max-width: 640px) {
      .content {
        padding: 25px;
      }

      h2 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- Replace this filename with your uploaded image file -->
    <img src="brew-banter-poster.png" alt="Brew and Banter RoboCafe poster" class="hero-image" />

    <section class="content">

      <a
        href="https://forms.gle/7CogxESp1wZb8r688"
        target="_blank"
        rel="noopener noreferrer"
        class="signup-button"
      >
        Get Updates!
      </a>
      <p></p>
      
      <h2>Sign-Up to hear more about the Brew &amp; Banter RoboCafe.</h2>



      <div class="note">
        This project has been approved by IRB no. HIRB00018266
      </div>
    </section>
  </main>
</body>
</html>
